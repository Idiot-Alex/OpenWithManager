<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenWith Manager</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231d211f'/%3E%3Ctext x='32' y='38' text-anchor='middle' font-family='Segoe UI,Arial,sans-serif' font-size='18' font-weight='700' fill='%23fffefa'%3EOW%3C/text%3E%3C/svg%3E" />
    <script src="./vendor/tailwindcss-3.4.17.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="command-bar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">OW</span>
          <div>
            <h1>OpenWith Manager</h1>
            <p>Choose what should open each kind of file.</p>
          </div>
        </div>

        <label class="search">
          <span class="sr-only">Search files or apps</span>
          <input id="searchInput" type="search" placeholder="Search files or apps" autocomplete="off" />
        </label>

        <div class="actions" aria-label="Actions">
          <button id="refreshButton" class="button secondary" type="button">Refresh</button>
          <button id="exportButton" class="button secondary" type="button">Export</button>
          <button id="importButton" class="button secondary" type="button">Compare</button>
          <button id="settingsButton" class="button primary" type="button">Open settings</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="rail" aria-label="Filters">
          <div>
            <p class="rail-label">Show</p>
            <div id="statusFilters" class="filter-stack"></div>
          </div>
          <div class="summary-strip">
            <div>
              <strong id="totalKinds">0</strong>
              <span>file kinds</span>
            </div>
            <div>
              <strong id="needsReview">0</strong>
              <span>need review</span>
            </div>
          </div>
        </aside>

        <section class="kind-list" aria-label="File kinds">
          <div id="kindList"></div>
          <div id="emptyState" class="empty" hidden>No matching file kinds.</div>
        </section>

        <aside id="detailPanel" class="detail" aria-label="Selected file kind"></aside>
      </section>
    </main>

    <dialog id="importDialog" class="compare-dialog">
      <form method="dialog">
        <header class="dialog-head">
          <div>
            <h2>Snapshot comparison</h2>
            <p id="importSummary"></p>
          </div>
          <button value="close" class="button secondary">Close</button>
        </header>
        <div class="dialog-body">
          <div id="diffRows" class="diff-list"></div>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" hidden></div>
    <script src="./app.js"></script>
  </body>
</html>
