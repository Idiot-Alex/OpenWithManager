<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenWith Manager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Default app associations</p>
          <h1>File default apps</h1>
          <p class="subtitle">Review which app opens each file type, then jump to Windows Settings to change it.</p>
        </div>
        <div class="actions">
          <button id="refreshButton" class="icon-button" title="Refresh associations">Refresh list</button>
          <button id="exportButton" class="secondary">Export snapshot</button>
          <button id="importButton" class="secondary">Compare import</button>
          <button id="settingsButton" class="primary">Default apps settings</button>
        </div>
      </section>

      <section class="toolbar">
        <label class="search">
          <span>Find file type</span>
          <input id="searchInput" type="search" placeholder=".pdf, image, Edge, Word..." autocomplete="off" />
        </label>
        <div id="categoryFilters" class="filters"></div>
      </section>

      <section class="content">
        <aside class="summary">
          <div>
            <span class="metric" id="totalCount">0</span>
            <p>file types checked</p>
          </div>
          <div>
            <span class="metric" id="userChoiceCount">0</span>
            <p>chosen by user</p>
          </div>
          <div>
            <span class="metric" id="unknownCount">0</span>
            <p>missing defaults</p>
          </div>
        </aside>

        <section class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Extension</th>
                <th>File type</th>
                <th>Opens with</th>
                <th>Set by</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="associationRows"></tbody>
          </table>
          <div id="emptyState" class="empty" hidden>No file types match your search.</div>
        </section>
      </section>
    </main>

    <dialog id="importDialog">
      <form method="dialog">
        <header>
          <h2>Snapshot comparison</h2>
          <button value="close" class="plain">Close</button>
        </header>
        <div id="importSummary" class="dialogSummary"></div>
        <div id="diffRows" class="diffRows"></div>
      </form>
    </dialog>

    <div id="toast" class="toast" hidden></div>
    <script src="./app.js"></script>
  </body>
</html>
