<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenWith Manager Preview</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231d211f'/%3E%3Ctext x='32' y='38' text-anchor='middle' font-family='Segoe UI,Arial,sans-serif' font-size='18' font-weight='700' fill='%23fffefa'%3EOW%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="command-bar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">OW</span>
          <div>
            <h1 id="appTitle">OpenWith Manager</h1>
            <p id="appTagline">Choose what should open each kind of file.</p>
          </div>
        </div>

        <label class="search">
          <span class="sr-only">Search files or apps</span>
          <i data-lucide="search" aria-hidden="true"></i>
          <input id="searchInput" type="search" placeholder="Search files or apps" autocomplete="off" />
        </label>

        <div id="actions" class="actions" aria-label="Actions">
          <button id="languageButton" class="button secondary icon-button language-button" type="button">
            <i data-lucide="languages" aria-hidden="true"></i>
            <span id="languageLabel" class="sr-only">Language</span>
            <span id="languageCurrent" aria-hidden="true">EN</span>
          </button>
          <button id="refreshButton" class="button secondary icon-button" type="button">
            <i data-lucide="refresh-cw" aria-hidden="true"></i>
            <span class="button-label sr-only">Refresh</span>
          </button>
          <button id="exportButton" class="button secondary icon-button" type="button">
            <i data-lucide="download" aria-hidden="true"></i>
            <span class="button-label sr-only">Export</span>
          </button>
          <button id="importButton" class="button secondary icon-button" type="button">
            <i data-lucide="git-compare-arrows" aria-hidden="true"></i>
            <span class="button-label sr-only">Compare</span>
          </button>
          <button id="settingsButton" class="button primary" type="button">
            <i data-lucide="settings" aria-hidden="true"></i>
            <span class="button-label">Open settings</span>
          </button>
        </div>
      </header>

      <section class="workspace">
        <section id="kindListSection" class="kind-list" aria-label="File kinds">
          <header class="list-head">
            <p id="fileKindsLabel" class="section-label">File kinds</p>
            <div id="statusFilters" class="filter-stack" aria-label="Filter file kinds"></div>
          </header>
          <div id="kindList"></div>
          <div id="emptyState" class="empty" hidden>No matching file kinds.</div>
        </section>

        <aside id="detailPanel" class="detail" aria-label="Selected file kind"></aside>
      </section>
    </main>

    <dialog id="importDialog" class="compare-dialog">
      <form method="dialog">
        <header class="dialog-head">
          <div>
            <h2 id="dialogTitle">Snapshot comparison</h2>
            <p id="importSummary"></p>
          </div>
          <button id="closeDialogButton" value="close" class="button secondary">Close</button>
        </header>
        <div class="dialog-body">
          <div id="diffRows" class="diff-list"></div>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" hidden></div>
    <script src="./preview.js"></script>
    <script src="./vendor/lucide-1.23.0.min.js"></script>
    <script src="./i18n.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
